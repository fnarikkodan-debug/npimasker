name: Build app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: NPIMasker-windows
            build_path: dist/NPIMasker.exe
            pyinstaller_args: --onefile --windowed --name NPIMasker --collect-all spacy --collect-all en_core_web_sm
          - os: macos-latest
            artifact_name: NPIMasker-macos
            build_path: dist/NPIMasker.app
            pyinstaller_args: --windowed --name NPIMasker --collect-all spacy --collect-all en_core_web_sm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build app
        run: pyinstaller ${{ matrix.pyinstaller_args }} main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.build_path }}
